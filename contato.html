<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato - IFSP</title>
    <link rel="icon" type="image/x-icon" href="dwba4_semana_imagens-master/favicon.ico">
</head>
<body>
    <header>
        <nav style="text-align: right;">
            <a href="index.html">HOME</a> | 
            <a href="eventos.html">EVENTOS</a> | 
            <a href="contato.html">CONTATO</a> | 
            <a href="sobre.html">SOBRE</a> | 
            <a href="#">ENTRAR</a>
        </nav>
        <img src="dwba4_semana_imagens-master/Logo.jpg" alt="Instituto Federal São Paulo" width="250">
    </header>

    <main>
        <h2>Mande uma mensagem</h2>
        <form action="#" method="post">
            <ul>
                <li>
                    <label for="nome">Nome </label>
                    <input type="text" id="nome" name="nome">
                </li>
                <li>
                    <label for="email">E-Mail </label>
                    <input type="email" id="email" name="email">
                </li>
                <li>
                    <label for="telefone">Telefone </label>
                    <input type="tel" id="telefone" name="telefone"> (99) 99999-9999
                </li>
                <li>
                    <label for="assunto">Assunto </label>
                    <select id="assunto" name="assunto">
                        <option value="">-- Selecione --</option>
                    </select>
                </li>
                <li>
                    <label for="mensagem">Mensagem </label><br>
                    <textarea id="mensagem" name="mensagem" rows="4" cols="30"></textarea>
                </li>
                <li>
                    <fieldset style="display: inline-block;">
                        <legend>Opções de Resposta</legend>
                        <label><input type="checkbox" name="resposta_email"> E-Mail</label>
                        <label><input type="checkbox" name="resposta_telefone"> Telefone</label>
                    </fieldset>
                </li>
                <li>
                    <button type="submit">Enviar</button>
                </li>
            </ul>
        </form>
    </main>

    <footer>
        <br><br>
        <div style="text-align: left;">
            <a href="https://web.facebook.com/ifsppirituba" target="_blank">
                <img src="dwba4_semana_imagens-master/facebook.png" alt="Página do Facebook do IFSP Pirituba" width="40">
            </a>
            <p>IFSP - Câmpus Pirituba - Av. Mutinga, 951 - Jardim Santo Elias - CEP: 05110-000 - São Paulo/SP - Contato: (011) 2504-0100</p>
        </div>
    </footer>
</body>
</html>
